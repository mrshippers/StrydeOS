<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrydeOS</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B2545;
    --navy-mid: #132D5E;
    --blue: #1C54F2;
    --blue-bright: #2E6BFF;
    --blue-glow: #4B8BF5;
    --glow-a: #6AABFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Outfit', sans-serif;
  }

  .splash {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--navy);
    overflow: hidden;
  }

  /* ═══ Canvas for procedural diagonal waveform ═══ */
  #waveCanvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    animation: canvasLife 3.6s ease 0.2s forwards;
  }
  @keyframes canvasLife {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    75%  { opacity: 0.65; }
    100% { opacity: 0; }
  }

  /* ═══ Diagonal light streak ═══ */
  .streak {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .streak::before {
    content: '';
    position: absolute;
    top: -10%; left: -10%;
    width: 120%; height: 3px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(28,84,242,0) 20%,
      rgba(46,107,255,0.5) 44%,
      rgba(75,139,245,0.85) 50%,
      rgba(46,107,255,0.5) 56%,
      rgba(28,84,242,0) 80%,
      transparent 100%
    );
    transform: rotate(-35deg);
    transform-origin: center;
    animation: streakMove 2s cubic-bezier(0.4,0,0.2,1) 0.6s forwards;
    opacity: 0;
    box-shadow:
      0 0 24px rgba(46,107,255,0.35),
      0 0 50px rgba(28,84,242,0.15);
  }
  .streak::after {
    content: '';
    position: absolute;
    top: -10%; left: -10%;
    width: 120%; height: 70px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(28,84,242,0) 25%,
      rgba(75,139,245,0.05) 45%,
      rgba(106,171,255,0.09) 50%,
      rgba(75,139,245,0.05) 55%,
      rgba(28,84,242,0) 75%,
      transparent 100%
    );
    transform: rotate(-35deg);
    transform-origin: center;
    filter: blur(18px);
    animation: streakMove 2s cubic-bezier(0.4,0,0.2,1) 0.6s forwards;
    opacity: 0;
  }
  @keyframes streakMove {
    0%   { opacity: 0; translate: 0 0; }
    8%   { opacity: 1; }
    82%  { opacity: 0.7; }
    100% { opacity: 0; translate: 0 120vh; }
  }

  /* ═══ Ambient centre glow ═══ */
  .amb {
    position: absolute;
    inset: 0;
    opacity: 0;
    animation: ambIn 3s ease 1s forwards;
    pointer-events: none;
  }
  .amb::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 550px; height: 550px;
    transform: translate(-50%, -50%);
    background: radial-gradient(
      ellipse at center,
      rgba(28,84,242,0.14) 0%,
      rgba(28,84,242,0.06) 35%,
      rgba(19,45,94,0.03) 60%,
      transparent 80%
    );
    filter: blur(35px);
  }
  @keyframes ambIn {
    0%   { opacity: 0; }
    50%  { opacity: 1; }
    100% { opacity: 0.55; }
  }

  /* ═══ Particles ═══ */
  .pts { position: absolute; inset: 0; pointer-events: none; }
  .pt {
    position: absolute;
    background: rgba(75,139,245,0.4);
    border-radius: 50%;
    opacity: 0;
    animation: ptDrift var(--dur) ease var(--del) forwards;
  }
  @keyframes ptDrift {
    0%   { opacity: 0; transform: translate(0, 0); }
    20%  { opacity: 0.5; }
    80%  { opacity: 0.15; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)); }
  }

  /* ═══ Logo block — monolith + wordmark ═══ */
  .logo-block {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    opacity: 0;
    animation: logoIn 1.3s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
  }
  @keyframes logoIn {
    0%   { opacity: 0; transform: translate(-50%, -44%) scale(0.9); filter: blur(10px); }
    55%  { filter: blur(0px); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px); }
  }

  /* Glow rings behind monolith */
  .mark-wrap {
    position: relative;
    width: 96px; height: 96px;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
  }
  .ring-1 { inset: -45px;  border: 1px solid rgba(75,139,245,0.04); animation: ringB 3.2s ease-in-out 2.2s infinite; }
  .ring-2 { inset: -90px;  border: 1px solid rgba(75,139,245,0.03); animation: ringB 3.2s ease-in-out 2.5s infinite; }
  .ring-3 { inset: -145px; border: 1px solid rgba(75,139,245,0.02); animation: ringB 3.2s ease-in-out 2.8s infinite; }
  @keyframes ringB {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50%      { opacity: 0.75; transform: scale(1.03); }
  }

  /* Soft radial behind icon */
  .icon-glow {
    position: absolute;
    inset: -35px;
    background: radial-gradient(circle, rgba(28,84,242,0.22) 0%, rgba(28,84,242,0.06) 45%, transparent 70%);
    filter: blur(14px);
    opacity: 0;
    animation: glowB 3s ease-in-out 2s infinite;
  }
  @keyframes glowB {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.06); }
  }

  .monolith {
    position: relative;
    z-index: 2;
    width: 96px; height: 96px;
    filter:
      drop-shadow(0 4px 20px rgba(0,0,0,0.35))
      drop-shadow(0 0 35px rgba(28,84,242,0.18));
  }

  /* ═══ Wordmark ═══ */
  .wordmark {
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: white;
    opacity: 0;
    animation: wordIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 2.2s forwards;
  }
  .wordmark .os { color: var(--blue-glow); }
  @keyframes wordIn {
    0%   { opacity: 0; transform: translateY(6px); filter: blur(4px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  /* ═══ Progress ═══ */
  .prog-track {
    width: 160px;
    height: 2px;
    background: rgba(28,84,242,0.1);
    border-radius: 1px;
    overflow: hidden;
    opacity: 0;
    animation: progShow 0.5s ease 2.4s forwards;
  }
  .prog-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--blue-glow));
    border-radius: 1px;
    animation: progGo 2.4s cubic-bezier(0.4, 0, 0.2, 1) 2.6s forwards;
    box-shadow: 0 0 8px rgba(46,107,255,0.45);
  }
  @keyframes progShow { to { opacity: 1; } }
  @keyframes progGo {
    0%   { width: 0%; }
    18%  { width: 22%; }
    38%  { width: 42%; }
    55%  { width: 64%; }
    75%  { width: 86%; }
    100% { width: 100%; }
  }

  /* ═══ Exit wipe ═══ */
  .splash.out {
    animation: wipeOff 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.25s forwards;
  }
  @keyframes wipeOff {
    0%   { clip-path: inset(0 0 0 0); opacity: 1; }
    100% { clip-path: inset(0 0 0 100%); opacity: 0; }
  }
</style>
</head>
<body>

<div class="splash" id="splash">

  <canvas id="waveCanvas"></canvas>
  <div class="streak"></div>
  <div class="amb"></div>
  <div class="pts" id="pts"></div>

  <div class="logo-block">

    <div class="mark-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="icon-glow"></div>

      <!-- ── Actual monolith.svg ── -->
      <svg class="monolith" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StrydeOS">
        <defs>
          <linearGradient id="s-cont" x1="0.1" y1="0" x2="0.85" y2="1">
            <stop offset="0%" stop-color="#2E6BFF" stop-opacity="0.58"/>
            <stop offset="100%" stop-color="#091D3E" stop-opacity="0.72"/>
          </linearGradient>
          <radialGradient id="s-rad" cx="28%" cy="24%" r="60%">
            <stop offset="0%" stop-color="#6AABFF" stop-opacity="0.42"/>
            <stop offset="100%" stop-color="#1C54F2" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="s-topface" x1="0.05" y1="1" x2="0.35" y2="0">
            <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.97"/>
          </linearGradient>
          <linearGradient id="s-rim" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="white" stop-opacity="0"/>
            <stop offset="28%" stop-color="white" stop-opacity="0.60"/>
            <stop offset="65%" stop-color="white" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="s-border" x1="0.1" y1="0" x2="0.4" y2="1">
            <stop offset="0%" stop-color="#7ABBFF" stop-opacity="0.65"/>
            <stop offset="100%" stop-color="#1C54F2" stop-opacity="0.06"/>
          </linearGradient>
          <clipPath id="s-pc">
            <rect x="35" y="20" width="22" height="60" rx="5"/>
          </clipPath>
          <clipPath id="s-ac">
            <polygon points="35,52 57,40 57,20 35,20"/>
          </clipPath>
        </defs>

        <!-- Container -->
        <rect width="100" height="100" rx="24" fill="url(#s-cont)"/>
        <rect width="100" height="100" rx="24" fill="url(#s-rad)"/>
        <rect width="100" height="100" rx="24" fill="none" stroke="url(#s-border)" stroke-width="1.2"/>

        <!-- Top arc rim highlight -->
        <path d="M 17 21 Q 50 12 83 21" stroke="url(#s-rim)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

        <!-- Pillar body -->
        <rect x="35" y="20" width="22" height="60" rx="5" fill="white" fill-opacity="0.07"/>
        <!-- Lower shadow -->
        <rect x="35" y="46" width="22" height="34" rx="5" fill="black" fill-opacity="0.10"/>

        <!-- Three ascending chevrons -->
        <g clip-path="url(#s-pc)">
          <polyline points="32,80 46,72 60,80" stroke="white" stroke-opacity="0.20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <polyline points="32,72 46,64 60,72" stroke="white" stroke-opacity="0.42" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <polyline points="32,64 46,56 60,64" stroke="white" stroke-opacity="0.72" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>

        <!-- Top face catch-light -->
        <rect x="35" y="20" width="22" height="60" rx="5" fill="url(#s-topface)" clip-path="url(#s-ac)"/>

        <!-- Diagonal cut edge -->
        <line x1="33" y1="52" x2="59" y2="39" stroke="white" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- ── Wordmark lockup ── -->
    <div class="wordmark">Stryde<span class="os">OS</span></div>

    <!-- ── Progress ── -->
    <div class="prog-track">
      <div class="prog-fill"></div>
    </div>

  </div>

</div>

<script>
/* ═══ Freeform flowing ribbons — PlayStation-style ═══ */
const cv = document.getElementById('waveCanvas');
const cx = cv.getContext('2d');
let W, H, t0;

function sz() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
sz();
addEventListener('resize', sz);
t0 = performance.now();

/* Organic noise: stack multiple sine harmonics for non-repeating flow */
function flow(x, t, seed) {
  return Math.sin(x * 0.0018 + t * 0.7 + seed)       * 1.0
       + Math.sin(x * 0.0041 + t * 1.1 + seed * 2.3) * 0.6
       + Math.sin(x * 0.0074 + t * 0.5 + seed * 4.1) * 0.35
       + Math.sin(x * 0.0112 + t * 1.6 + seed * 0.7) * 0.2
       + Math.sin(x * 0.0023 + t * 0.3 + seed * 5.8) * 0.8;
}

/* Ribbon configs — each one is a flowing organic band */
const ribbons = [
  { seed: 0.0, amp: 75,  width: 120, speed: 0.8,  delay: 0.0,  r: 28,  g: 84,  b: 242, peakAlpha: 0.10 },
  { seed: 2.4, amp: 90,  width: 90,  speed: 0.65, delay: 0.12, r: 46,  g: 107, b: 255, peakAlpha: 0.12 },
  { seed: 4.8, amp: 65,  width: 140, speed: 0.9,  delay: 0.06, r: 75,  g: 139, b: 245, peakAlpha: 0.08 },
  { seed: 1.6, amp: 100, width: 70,  speed: 0.55, delay: 0.18, r: 46,  g: 107, b: 255, peakAlpha: 0.14 },
  { seed: 6.2, amp: 55,  width: 160, speed: 1.0,  delay: 0.24, r: 28,  g: 84,  b: 242, peakAlpha: 0.07 },
  { seed: 3.7, amp: 85,  width: 50,  speed: 0.7,  delay: 0.10, r: 106, g: 171, b: 255, peakAlpha: 0.10 },
  { seed: 8.1, amp: 70,  width: 100, speed: 0.85, delay: 0.15, r: 75,  g: 139, b: 245, peakAlpha: 0.09 },
];

function wave(t) {
  const e = (t - t0) / 1000;
  cx.clearRect(0, 0, W, H);

  /* Global sweep progress — drives the diagonal travel */
  const sweepRaw = Math.min(e / 2.8, 1);
  const sweep = 1 - Math.pow(1 - sweepRaw, 3);

  const diag = Math.sqrt(W * W + H * H);
  const angle = -35 * Math.PI / 180;

  for (const rb of ribbons) {
    /* Per-ribbon sweep with staggered delay */
    const rp = Math.max(0, Math.min(1, (sweep - rb.delay) / 0.55));
    if (rp <= 0 || rp >= 1) continue;

    /* Fade envelope — breathes in and out */
    const alpha = Math.sin(rp * Math.PI) * rb.peakAlpha;
    if (alpha < 0.005) continue;

    cx.save();
    cx.translate(W / 2, H / 2);
    cx.rotate(angle);
    cx.translate(-W / 2, -H / 2);

    /* Sweep position along the diagonal */
    const baseY = -diag * 0.35 + rp * diag * 1.7;
    const halfW = rb.width / 2;
    const step = 6;
    const span = diag * 2.5;
    const startX = -diag * 0.6;

    /* ── Build upper and lower edges of the ribbon with organic flow ── */
    const upperPts = [];
    const lowerPts = [];

    for (let x = startX; x < startX + span; x += step) {
      const n = flow(x, e * rb.speed, rb.seed);
      const centerY = baseY + n * rb.amp;

      /* Ribbon width also undulates slightly */
      const widthMod = 1 + Math.sin(x * 0.003 + e * 0.4 + rb.seed * 1.5) * 0.3;
      const hw = halfW * widthMod;

      upperPts.push({ x, y: centerY - hw });
      lowerPts.push({ x, y: centerY + hw });
    }

    /* ── Draw filled ribbon shape ── */
    /* Gradient perpendicular to ribbon flow */
    const gy = baseY;
    const grad = cx.createLinearGradient(0, gy - rb.width, 0, gy + rb.width);
    grad.addColorStop(0,    `rgba(${rb.r},${rb.g},${rb.b}, 0)`);
    grad.addColorStop(0.25, `rgba(${rb.r},${rb.g},${rb.b}, ${alpha * 0.5})`);
    grad.addColorStop(0.5,  `rgba(${rb.r},${rb.g},${rb.b}, ${alpha})`);
    grad.addColorStop(0.75, `rgba(${rb.r},${rb.g},${rb.b}, ${alpha * 0.5})`);
    grad.addColorStop(1,    `rgba(${rb.r},${rb.g},${rb.b}, 0)`);

    cx.beginPath();
    /* Upper edge — forward */
    cx.moveTo(upperPts[0].x, upperPts[0].y);
    for (let i = 1; i < upperPts.length - 1; i++) {
      const cpx = (upperPts[i].x + upperPts[i + 1].x) / 2;
      const cpy = (upperPts[i].y + upperPts[i + 1].y) / 2;
      cx.quadraticCurveTo(upperPts[i].x, upperPts[i].y, cpx, cpy);
    }
    /* Lower edge — backward */
    const last = lowerPts[lowerPts.length - 1];
    cx.lineTo(last.x, last.y);
    for (let i = lowerPts.length - 2; i >= 1; i--) {
      const cpx = (lowerPts[i].x + lowerPts[i - 1].x) / 2;
      const cpy = (lowerPts[i].y + lowerPts[i - 1].y) / 2;
      cx.quadraticCurveTo(lowerPts[i].x, lowerPts[i].y, cpx, cpy);
    }
    cx.closePath();
    cx.fillStyle = grad;
    cx.fill();

    /* ── Centre spine line — thin, bright, organic ── */
    cx.beginPath();
    const spinePts = [];
    for (let x = startX; x < startX + span; x += step) {
      const n = flow(x, e * rb.speed, rb.seed);
      spinePts.push({ x, y: baseY + n * rb.amp });
    }
    cx.moveTo(spinePts[0].x, spinePts[0].y);
    for (let i = 1; i < spinePts.length - 1; i++) {
      const cpx = (spinePts[i].x + spinePts[i + 1].x) / 2;
      const cpy = (spinePts[i].y + spinePts[i + 1].y) / 2;
      cx.quadraticCurveTo(spinePts[i].x, spinePts[i].y, cpx, cpy);
    }
    cx.strokeStyle = `rgba(${rb.r},${rb.g},${rb.b}, ${alpha * 2.5})`;
    cx.lineWidth = 1.2;
    cx.stroke();

    cx.restore();
  }

  if (e < 3.8) requestAnimationFrame(wave);
}
requestAnimationFrame(wave);

/* ═══ Particles ═══ */
const pts = document.getElementById('pts');
for (let i = 0; i < 22; i++) {
  const p = document.createElement('div');
  p.className = 'pt';
  const s = 1 + Math.random() * 1.8;
  p.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    width:${s}px; height:${s}px;
    --dx:${-25 + Math.random()*50}px;
    --dy:${-40 - Math.random()*40}px;
    --dur:${3 + Math.random()*3.5}s;
    --del:${Math.random()*2}s;
  `;
  pts.appendChild(p);
}

/* ═══ Auto-dismiss ═══ */
setTimeout(() => document.getElementById('splash').classList.add('out'), 5200);
</script>

</body>
</html>
