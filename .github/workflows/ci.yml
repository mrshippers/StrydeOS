name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci_placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000:web:000"
          # Firebase Admin SDK needs these to initialise during page data collection
          FIREBASE_PROJECT_ID: ci-placeholder
          FIREBASE_CLIENT_EMAIL: ci@ci-placeholder.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIBogIBAAJBALRiMLAHudeSA/x3hB2f+2NRkJLA/GbEbKTYIAhFAHCmQ0eGKEuA\nn8AX0/96F3AjJFOHSMk7GqLrFFPWVdMPQGkCAwEAAQJAGqaD1RQHFTBOD/jPx6HI\n0MNEY1bI5YCGfJ8wNPRwCq9xPRx3Hy9vBqR8xM3F9aFz2sgJDNDlFYnFSwJXN6N\noQIhAOJdQYBPa8Jke2JyFz1LqACinyJuaBn3QNjFEZ1GgjDFAiEAyyLxqHfVp3Wl\naIwJCGn0GCaFXCgayFaJaDXe9MMxJZUCIGl/S0UB0y0zcX+q25IC9MXiLJ2vHby5\n0CVbBNg1QpjBAiEAhFG7+ZIBDl5ERb0Mzg5JG3OklEjXCHF4jbrP2EFnvlkCIBPx\nq8wG3kSM8S50HJ94MNjFyl6GvfCG64adBKzrtVCq\n-----END RSA PRIVATE KEY-----"
