<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stryde Ad 01 · Some Clinics Guess</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B2545;
    --navy-deep: #060F1E;
    --blue: #1C54F2;
    --blue-bright: #2E6BFF;
    --blue-glow: #4B8BF5;
    --purple: #8B5CF6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--navy);
  }

  [data-composition-id="ad01-some-clinics-guess"] {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Outfit', -apple-system, sans-serif;
    color: white;
    -webkit-font-smoothing: antialiased;
  }

  /* Background stack */
  .bg-layer {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .glow-1 {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 10%, rgba(28, 84, 242, 0.20) 0%, transparent 70%);
  }

  .glow-2 {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 40% 35% at 80% 90%, rgba(139, 92, 246, 0.12) 0%, transparent 65%);
  }

  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1.4px, transparent 1.4px);
    background-size: 32px 32px;
    opacity: 0.9;
  }

  /* Content */
  .scene-content {
    width: 100%;
    height: 100%;
    padding: 180px 80px 120px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }

  .eyebrow {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--blue-glow);
    margin-bottom: 56px;
    text-align: center;
  }

  .headline {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 132px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    text-align: center;
    color: white;
    margin-bottom: 96px;
  }

  .headline .line-2 {
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .pills {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
    width: 100%;
  }

  .pill {
    font-size: 32px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    padding: 22px 48px;
    border-radius: 50px;
    background: rgba(28, 84, 242, 0.08);
    border: 1px solid rgba(75, 139, 245, 0.24);
    letter-spacing: -0.005em;
    min-width: 520px;
    text-align: center;
  }

  .endcard {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .monolith {
    width: 140px;
    height: 140px;
  }

  .endcard-url {
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.01em;
  }

  .endcard-tag {
    font-size: 22px;
    font-weight: 500;
    color: var(--blue-glow);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div
  id="ad01"
  data-composition-id="ad01-some-clinics-guess"
  data-start="0"
  data-duration="5"
  data-track-index="0"
  data-width="1080"
  data-height="1920">

  <div class="bg-layer">
    <div class="glow-1" id="a1-glow1"></div>
    <div class="glow-2" id="a1-glow2"></div>
    <div class="dots"></div>
  </div>

  <div class="scene-content">

    <div class="eyebrow" id="a1-eyebrow">Intelligence &middot; Dashboard</div>

    <div class="headline">
      <div class="line-1" id="a1-line1">Some clinics guess.</div>
      <div class="line-2" id="a1-line2">Ours don't.</div>
    </div>

    <div class="pills">
      <div class="pill" id="a1-p1">Follow-up rate</div>
      <div class="pill" id="a1-p2">DNA</div>
      <div class="pill" id="a1-p3">HEP compliance</div>
      <div class="pill" id="a1-p4">Utilisation</div>
      <div class="pill" id="a1-p5">Revenue per session</div>
      <div class="pill" id="a1-p6">NPS</div>
    </div>

    <div class="endcard" id="a1-endcard">
      <div class="monolith">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="140" height="140">
          <defs>
            <linearGradient id="a1-cont" x1="0.1" y1="0" x2="0.85" y2="1">
              <stop offset="0%" stop-color="#2E6BFF" stop-opacity="0.58"/>
              <stop offset="100%" stop-color="#091D3E" stop-opacity="0.72"/>
            </linearGradient>
            <radialGradient id="a1-rad" cx="28%" cy="24%" r="60%">
              <stop offset="0%" stop-color="#6AABFF" stop-opacity="0.42"/>
              <stop offset="100%" stop-color="#1C54F2" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="a1-topface" x1="0.05" y1="1" x2="0.35" y2="0">
              <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
              <stop offset="100%" stop-color="white" stop-opacity="0.97"/>
            </linearGradient>
            <linearGradient id="a1-rim" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="white" stop-opacity="0"/>
              <stop offset="28%" stop-color="white" stop-opacity="0.60"/>
              <stop offset="65%" stop-color="white" stop-opacity="0.12"/>
              <stop offset="100%" stop-color="white" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="a1-border" x1="0.1" y1="0" x2="0.4" y2="1">
              <stop offset="0%" stop-color="#7ABBFF" stop-opacity="0.65"/>
              <stop offset="100%" stop-color="#1C54F2" stop-opacity="0.06"/>
            </linearGradient>
            <clipPath id="a1-pc"><rect x="35" y="20" width="22" height="60" rx="5"/></clipPath>
            <clipPath id="a1-ac"><polygon points="35,52 57,40 57,20 35,20"/></clipPath>
          </defs>
          <rect width="100" height="100" rx="24" fill="url(#a1-cont)"/>
          <rect width="100" height="100" rx="24" fill="url(#a1-rad)"/>
          <rect width="100" height="100" rx="24" fill="none" stroke="url(#a1-border)" stroke-width="1.2"/>
          <path d="M 17 21 Q 50 12 83 21" stroke="url(#a1-rim)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <rect x="35" y="20" width="22" height="60" rx="5" fill="white" fill-opacity="0.07"/>
          <rect x="35" y="46" width="22" height="34" rx="5" fill="black" fill-opacity="0.10"/>
          <g clip-path="url(#a1-pc)">
            <polyline points="32,80 46,72 60,80" stroke="white" stroke-opacity="0.20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <polyline points="32,72 46,64 60,72" stroke="white" stroke-opacity="0.42" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <polyline points="32,64 46,56 60,64" stroke="white" stroke-opacity="0.72" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </g>
          <rect x="35" y="20" width="22" height="60" rx="5" fill="url(#a1-topface)" clip-path="url(#a1-ac)"/>
          <line x1="33" y1="52" x2="59" y2="39" stroke="white" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="endcard-url">strydeos.com</div>
      <div class="endcard-tag">Intelligence &middot; From &pound;99/mo</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // Ambient glow pulse (one breath across 5s duration)
  tl.fromTo("#a1-glow1",
    { scale: 1.0 },
    { scale: 1.04, duration: 2.5, yoyo: true, repeat: 1, ease: "sine.inOut", transformOrigin: "50% 10%" },
    0
  );
  tl.fromTo("#a1-glow2",
    { scale: 1.0 },
    { scale: 1.05, duration: 2.5, yoyo: true, repeat: 1, ease: "sine.inOut", transformOrigin: "80% 90%" },
    0.2
  );

  // Beat 1 · 0.15-0.75s - eyebrow
  tl.from("#a1-eyebrow", { opacity: 0, y: 14, duration: 0.45, ease: "power2.out" }, 0.15);

  // Beat 1 · 0.35-0.90s - "Some clinics guess."
  tl.from("#a1-line1", { opacity: 0, y: 36, duration: 0.60, ease: "power3.out" }, 0.35);

  // Beat 2 · 1.30-2.10s - "Ours don't." slide + gradient punch
  tl.from("#a1-line2",
    { opacity: 0, y: 48, scale: 0.96, duration: 0.75, ease: "expo.out" },
    1.30
  );

  // Beat 3 · 2.55s onward - KPI pills cascade (80ms stagger, 6 pills)
  tl.from([
    "#a1-p1", "#a1-p2", "#a1-p3", "#a1-p4", "#a1-p5", "#a1-p6"
  ], {
    opacity: 0,
    y: 28,
    duration: 0.45,
    stagger: 0.08,
    ease: "power2.out"
  }, 2.55);

  // Beat 4 · 4.15s - End-card appears
  tl.from("#a1-endcard",
    { opacity: 0, y: 22, duration: 0.65, ease: "power2.out" },
    4.15
  );

  window.__timelines["ad01-some-clinics-guess"] = tl;
</script>

</body>
</html>
