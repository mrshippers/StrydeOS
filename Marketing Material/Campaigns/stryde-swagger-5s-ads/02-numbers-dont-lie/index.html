<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stryde Ad 02 · The Numbers Don't Lie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B2545;
    --navy-deep: #060F1E;
    --blue: #1C54F2;
    --blue-bright: #2E6BFF;
    --blue-glow: #4B8BF5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--navy-deep);
  }

  [data-composition-id="ad02-numbers-dont-lie"] {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: var(--navy-deep);
    font-family: 'Outfit', -apple-system, sans-serif;
    color: white;
    -webkit-font-smoothing: antialiased;
  }

  /* Background stack */
  .bg-layer {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .glow-center {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 65% 55% at 50% 45%, rgba(28, 84, 242, 0.18) 0%, transparent 70%);
  }

  .glow-accent {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 35% 30% at 20% 20%, rgba(75, 139, 245, 0.10) 0%, transparent 65%);
  }

  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1.4px, transparent 1.4px);
    background-size: 32px 32px;
    opacity: 0.85;
  }

  /* Content */
  .scene-content {
    width: 100%;
    height: 100%;
    padding: 160px 80px 120px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .eyebrow {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-bottom: 100px;
  }

  .headline-block {
    text-align: center;
    margin-bottom: 88px;
  }

  .headline-top,
  .headline-bottom {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 128px;
    line-height: 1.02;
    letter-spacing: -0.025em;
  }

  .headline-top {
    color: white;
    margin-bottom: 28px;
  }

  .headline-top .word {
    display: inline-block;
    margin-right: 0.18em;
  }
  .headline-top .word:last-child { margin-right: 0; }

  .headline-bottom {
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
  }

  .support {
    font-size: 36px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    text-align: center;
    line-height: 1.35;
    max-width: 780px;
    letter-spacing: -0.005em;
  }

  .endcard {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .monolith { width: 140px; height: 140px; }

  .endcard-url {
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.01em;
  }

  .endcard-tag {
    font-size: 22px;
    font-weight: 500;
    color: var(--blue-glow);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div
  id="ad02"
  data-composition-id="ad02-numbers-dont-lie"
  data-start="0"
  data-duration="5"
  data-track-index="0"
  data-width="1080"
  data-height="1920">

  <div class="bg-layer">
    <div class="glow-center" id="a2-glow1"></div>
    <div class="glow-accent" id="a2-glow2"></div>
    <div class="dots"></div>
  </div>

  <div class="scene-content">

    <div class="eyebrow" id="a2-eyebrow">Intelligence</div>

    <div class="headline-block">
      <div class="headline-top" id="a2-top">
        <span class="word">The</span>
        <span class="word">numbers</span>
        <span class="word">don't</span>
        <span class="word">lie.</span>
      </div>
      <div class="headline-bottom" id="a2-bottom">Your spreadsheet does.</div>
    </div>

    <div class="support" id="a2-support">
      Built for owners who'd rather know than hope.
    </div>

    <div class="endcard" id="a2-endcard">
      <div class="monolith">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="140" height="140">
          <defs>
            <linearGradient id="a2-cont" x1="0.1" y1="0" x2="0.85" y2="1">
              <stop offset="0%" stop-color="#2E6BFF" stop-opacity="0.58"/>
              <stop offset="100%" stop-color="#091D3E" stop-opacity="0.72"/>
            </linearGradient>
            <radialGradient id="a2-rad" cx="28%" cy="24%" r="60%">
              <stop offset="0%" stop-color="#6AABFF" stop-opacity="0.42"/>
              <stop offset="100%" stop-color="#1C54F2" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="a2-topface" x1="0.05" y1="1" x2="0.35" y2="0">
              <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
              <stop offset="100%" stop-color="white" stop-opacity="0.97"/>
            </linearGradient>
            <linearGradient id="a2-rim" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="white" stop-opacity="0"/>
              <stop offset="28%" stop-color="white" stop-opacity="0.60"/>
              <stop offset="65%" stop-color="white" stop-opacity="0.12"/>
              <stop offset="100%" stop-color="white" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="a2-border" x1="0.1" y1="0" x2="0.4" y2="1">
              <stop offset="0%" stop-color="#7ABBFF" stop-opacity="0.65"/>
              <stop offset="100%" stop-color="#1C54F2" stop-opacity="0.06"/>
            </linearGradient>
            <clipPath id="a2-pc"><rect x="35" y="20" width="22" height="60" rx="5"/></clipPath>
            <clipPath id="a2-ac"><polygon points="35,52 57,40 57,20 35,20"/></clipPath>
          </defs>
          <rect width="100" height="100" rx="24" fill="url(#a2-cont)"/>
          <rect width="100" height="100" rx="24" fill="url(#a2-rad)"/>
          <rect width="100" height="100" rx="24" fill="none" stroke="url(#a2-border)" stroke-width="1.2"/>
          <path d="M 17 21 Q 50 12 83 21" stroke="url(#a2-rim)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <rect x="35" y="20" width="22" height="60" rx="5" fill="white" fill-opacity="0.07"/>
          <rect x="35" y="46" width="22" height="34" rx="5" fill="black" fill-opacity="0.10"/>
          <g clip-path="url(#a2-pc)">
            <polyline points="32,80 46,72 60,80" stroke="white" stroke-opacity="0.20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <polyline points="32,72 46,64 60,72" stroke="white" stroke-opacity="0.42" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <polyline points="32,64 46,56 60,64" stroke="white" stroke-opacity="0.72" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </g>
          <rect x="35" y="20" width="22" height="60" rx="5" fill="url(#a2-topface)" clip-path="url(#a2-ac)"/>
          <line x1="33" y1="52" x2="59" y2="39" stroke="white" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="endcard-url">strydeos.com</div>
      <div class="endcard-tag">Meet Intelligence</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // Ambient glow pulse
  tl.fromTo("#a2-glow1",
    { scale: 1.0 },
    { scale: 1.05, duration: 2.5, yoyo: true, repeat: 1, ease: "sine.inOut", transformOrigin: "50% 45%" },
    0
  );
  tl.fromTo("#a2-glow2",
    { scale: 1.0, opacity: 0.7 },
    { scale: 1.08, opacity: 1.0, duration: 2.5, yoyo: true, repeat: 1, ease: "sine.inOut", transformOrigin: "20% 20%" },
    0.3
  );

  // Beat 1a · 0.15-0.55s - eyebrow
  tl.from("#a2-eyebrow", { opacity: 0, y: 12, duration: 0.4, ease: "power2.out" }, 0.15);

  // Beat 1b · 0.35s onward - "The numbers don't lie." word-by-word
  tl.from("#a2-top .word",
    { opacity: 0, y: 28, duration: 0.55, stagger: 0.12, ease: "power3.out" },
    0.35
  );

  // Beat 2 · 1.55-2.30s - "Your spreadsheet does." punch (after brief hold)
  tl.from("#a2-bottom",
    { opacity: 0, y: 50, scale: 0.94, duration: 0.70, ease: "expo.out" },
    1.55
  );

  // Beat 3 · 2.85-3.60s - supporting line
  tl.from("#a2-support",
    { opacity: 0, y: 20, duration: 0.70, ease: "power2.out" },
    2.85
  );

  // Beat 4 · 4.15s - end-card
  tl.from("#a2-endcard",
    { opacity: 0, y: 22, duration: 0.65, ease: "power2.out" },
    4.15
  );

  window.__timelines["ad02-numbers-dont-lie"] = tl;
</script>

</body>
</html>
