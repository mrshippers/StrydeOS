<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrydeOS — Clinic. Not chaos.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1C54F2;
    --blue-bright: #2E6BFF;
    --blue-glow: #4B8BF5;
    --navy: #0B2545;
    --ink: #232a38;
    --concrete: #EBE8E2;
    --concrete-2: #E3DFD7;
    --hair: rgba(11,37,69,0.18);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--concrete); overflow: hidden; }

  .wall {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 18% 20%, rgba(255,255,255,0.5) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 85% 80%, rgba(120,115,105,0.10) 0%, transparent 65%),
      radial-gradient(ellipse 50% 45% at 70% 15%, rgba(130,125,115,0.07) 0%, transparent 60%),
      linear-gradient(168deg, var(--concrete) 0%, var(--concrete-2) 100%);
  }
  .wall::after {
    content: ''; position: absolute; inset: 0; opacity: 0.16;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  }

  /* matted print, centred in the wall, symmetric margins */
  .plate {
    position: fixed; inset: 0;
    width: min(1140px, 90vw); height: min(78vh, 760px);
    margin: auto;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  /* running head / foot sit on a hairline that spans the plate */
  .meta {
    display: flex; justify-content: space-between; align-items: baseline;
    font-weight: 500; font-size: clamp(0.6rem, 0.78vw, 0.72rem);
    letter-spacing: 0.26em; text-transform: uppercase;
    color: rgba(35,42,56,0.5);
    opacity: 0; animation: fadeIn 1.4s ease 2.0s forwards;
  }
  .meta.head { padding-bottom: 0.85rem; border-bottom: 1px solid var(--hair); }
  .meta.foot { padding-top: 0.85rem; border-top: 1px solid var(--hair); }
  .meta .accent { color: var(--blue); }

  /* the cluster: object | spine-axis | caption, locked to one horizon, centred */
  .stage {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: auto auto minmax(280px, 420px);
    justify-content: center; align-items: center;
    column-gap: clamp(1.5rem, 3.4vw, 3.6rem);
  }

  /* ---- object ---- */
  .object { position: relative; display: flex; flex-direction: column; align-items: center; }
  .monolith-wrap {
    position: relative; height: clamp(220px, 34vh, 330px); aspect-ratio: 187 / 560; z-index: 1;
    opacity: 0; animation: objectIn 1.6s var(--ease) 0.25s forwards;
  }
  @keyframes objectIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .monolith { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 18px 30px rgba(35,42,56,0.26)); }
  .chev-overlay { position: absolute; inset: 0; width: 100%; height: 100%; mix-blend-mode: screen; pointer-events: none; }
  .chev-overlay polyline { fill: none; stroke: var(--blue-bright); stroke-width: 13; stroke-linecap: round; stroke-linejoin: round; filter: blur(5px); opacity: 0; }
  .pul-1 { animation: chevPulse 3.2s ease-in-out 2.2s infinite; }
  .pul-2 { animation: chevPulse 3.2s ease-in-out 2.6s infinite; }
  .pul-3 { animation: chevPulse 3.2s ease-in-out 3.0s infinite; }
  @keyframes chevPulse { 0%,100% { opacity: 0; } 45% { opacity: 0.85; } }
  .contact { width: 130%; height: 13px; margin-top: -5px; border-radius: 50%; background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(35,42,56,0.30) 0%, transparent 70%); filter: blur(4px); opacity: 0; animation: fadeIn 1.6s ease 0.9s forwards; }
  .refl { height: clamp(58px, 8vh, 84px); aspect-ratio: 187 / 150; overflow: hidden; margin-top: -11px; opacity: 0; animation: fadeIn 2s ease 1.2s forwards; }
  .refl img { height: clamp(220px, 34vh, 330px); transform: scaleY(-1); filter: blur(5px); opacity: 0.16; -webkit-mask-image: linear-gradient(to bottom, black, transparent 70%); mask-image: linear-gradient(to bottom, black, transparent 70%); }

  /* ---- spine = the axis (signature) ---- */
  .spine {
    position: relative;
    width: clamp(96px, 9vw, 132px); height: min(66vh, 612px); align-self: center;
    color: rgba(11,37,69,0.6); pointer-events: none;
    opacity: 0; animation: fadeIn 1.5s ease 0.9s forwards;
    -webkit-mask-image: linear-gradient(to bottom, transparent, black 14%, black 86%, transparent);
    mask-image: linear-gradient(to bottom, transparent, black 14%, black 86%, transparent);
    overflow: visible;
  }
  /* faint vertical axis line the vertebrae hang on */
  .spine::before {
    content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px;
    transform: translateX(-0.5px);
    background: linear-gradient(to bottom, transparent, rgba(11,37,69,0.14) 16%, rgba(11,37,69,0.14) 84%, transparent);
  }
  .spine-svg { position: relative; width: 100%; height: 100%; overflow: visible; }
  .spine-svg polygon, .spine-svg line {
    stroke-dasharray: 1; stroke-dashoffset: 1;
    animation: drawOn 0.7s var(--ease) forwards; animation-delay: calc(0.5s + var(--i) * 0.04s);
  }
  .spine-svg polygon[stroke="currentColor"] { stroke-width: 1.4; }
  .spine-svg .disc { stroke-width: 1; opacity: 0.5; }
  /* active modules: the blue vertebrae glow */
  .spine-svg polygon[fill="#1C54F2"] {
    fill-opacity: 0; stroke-width: 1.6;
    filter: drop-shadow(0 0 7px rgba(28,84,242,0.55));
    animation: drawOn 0.7s var(--ease) forwards, blockFill 0.6s ease forwards;
    animation-delay: calc(0.5s + var(--i) * 0.04s), calc(1.0s + var(--i) * 0.04s);
  }
  @keyframes drawOn { to { stroke-dashoffset: 0; } }
  @keyframes blockFill { to { fill-opacity: 0.9; } }
  .callout line { stroke-width: 1; opacity: 0.55; }
  .callout text {
    font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.18em;
    fill: var(--navy); stroke: none; opacity: 0; animation: textIn 0.8s ease forwards; animation-delay: calc(1.2s + var(--i) * 0.04s);
  }
  @keyframes textIn { to { opacity: 0.92; } }
  /* the signal travelling the spine — blue, glowing, reads on concrete */
  .spine-svg .pulse {
    stroke: var(--blue-bright); stroke-width: 3;
    stroke-dasharray: 0.1 0.9; stroke-dashoffset: 1.1; opacity: 0;
    filter: drop-shadow(0 0 4px var(--blue-glow));
    animation: travel 4.5s cubic-bezier(0.45,0,0.55,1) 3.2s infinite;
  }
  @keyframes travel { 0% { stroke-dashoffset: 1.1; opacity: 0; } 10% { opacity: 0.95; } 50% { opacity: 0.95; } 65% { stroke-dashoffset: 0; opacity: 0; } 100% { stroke-dashoffset: 0; opacity: 0; } }

  /* ---- caption ---- */
  .caption { z-index: 2; }
  .kicker { font-weight: 500; font-size: clamp(0.68rem, 0.95vw, 0.8rem); letter-spacing: 0.32em; text-transform: uppercase; color: var(--blue); opacity: 0; animation: lineUp 1.2s var(--ease) 0.9s forwards; }
  .tagline { font-family: 'DM Serif Display', serif; font-weight: 400; font-size: clamp(2rem, 4vw, 3.4rem); line-height: 1.05; color: var(--ink); margin-top: 1.1rem; opacity: 0; animation: lineUp 1.4s var(--ease) 1.1s forwards; }
  .tagline em { font-style: italic; color: var(--blue); text-shadow: 0 1px 1px rgba(11, 37, 69, 0.2); }
  .rule { width: 0; height: 1px; background: rgba(35,42,56,0.28); margin: 1.9rem 0 1.7rem; animation: ruleGrow 1.3s var(--ease) 1.5s forwards; }
  @keyframes ruleGrow { to { width: 64px; } }
  .body-line { font-weight: 300; font-size: clamp(0.95rem, 1.3vw, 1.1rem); line-height: 1.65; color: rgba(35,42,56,0.72); max-width: 36ch; opacity: 0; animation: lineUp 1.4s var(--ease) 1.7s forwards; }
  .url { display: inline-block; margin-top: 1.9rem; font-weight: 400; font-size: clamp(0.78rem, 1vw, 0.9rem); letter-spacing: 0.06em; color: var(--navy); border-bottom: 1px solid rgba(28,84,242,0.4); padding-bottom: 2px; text-decoration: none; opacity: 0; animation: lineUp 1.4s var(--ease) 1.95s forwards; transition: color 0.4s var(--ease), border-color 0.4s var(--ease); }
  .url:hover { color: var(--blue); border-color: var(--blue); }
  .url:focus-visible { outline: 2px solid var(--blue); outline-offset: 4px; border-radius: 1px; }
  @keyframes lineUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ---- mobile ---- */
  @media (max-width: 760px) {
    .plate { width: 86vw; height: 88vh; }
    .stage { grid-template-columns: 1fr; justify-items: center; row-gap: clamp(2rem, 6vh, 3.5rem); }
    .spine { display: none; }
    .monolith-wrap { height: 30vh; }
    .caption { text-align: center; max-width: 38ch; }
    .rule { margin-inline: auto; }
    .body-line { margin: 0 auto; }
    .meta { letter-spacing: 0.2em; font-size: 0.6rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .monolith-wrap, .meta, .object .contact, .refl, .spine, .kicker, .tagline, .body-line, .url { opacity: 1 !important; transform: none !important; }
    .rule { width: 64px !important; }
    .spine-svg polygon, .spine-svg line { stroke-dashoffset: 0 !important; }
    .spine-svg polygon[fill="#1C54F2"] { fill-opacity: 0.9 !important; }
    .callout text { opacity: 0.92 !important; }
    .spine-svg .pulse { opacity: 0 !important; }
    .chev-overlay polyline { opacity: 0.85 !important; }
  }
</style>
</head>
