<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>StrydeOS</title>
</head>
<body style="margin:0;padding:0;background:#0B2545;font-family:'Outfit',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <div style="padding:60px 32px 48px;text-align:center;background:linear-gradient(180deg,#0B2545 0%,#132D5E 100%);">
    <p style="margin:0 0 20px;font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:#4B8BF5;">{{KICKER}}</p>
    <h1 style="margin:0 0 16px;font-family:'DM Serif Display',Georgia,serif;font-size:36px;font-weight:400;line-height:1.15;color:#FFFFFF;">{{HEADING}}</h1>
    <div style="margin:0 auto;max-width:560px;font-size:15px;color:#FFFFFF;line-height:1.6;text-align:left;">{{CONTENT}}</div>
  </div>
  {{SECTIONS}}
  <div style="padding:40px 32px 48px;text-align:center;background:linear-gradient(180deg,#0B2545 0%,#132D5E 100%);">
    <a href="{{CTA_URL}}" style="display:inline-block;padding:14px 36px;border-radius:50px;background:#1C54F2;color:#FFFFFF;font-size:15px;font-weight:600;text-decoration:none;">{{CTA_LABEL}}</a>
  </div>
  <div style="padding:24px 32px 32px;text-align:center;background:#0B2545;border-top:1px solid rgba(255,255,255,0.04);">
    <p style="margin:0 0 6px;font-size:11px;color:rgba(255,255,255,0.25);">StrydeOS · The Clinic OS for private practice</p>
    <p style="margin:0;"><a href="https://portal.strydeos.com/settings" style="font-size:11px;color:#4B8BF5;text-decoration:none;">Manage preferences</a><span style="color:rgba(255,255,255,0.15);margin:0 6px;">·</span><a href="https://portal.strydeos.com/settings?unsubscribe=updates" style="font-size:11px;color:rgba(255,255,255,0.25);text-decoration:none;">Unsubscribe</a></p>
  </div>
</body>
</html>
